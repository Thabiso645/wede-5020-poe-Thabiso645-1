<div class="container">

    <form class="Booking-form" onsubmit="returnshowMessage()">
        <h2>Book an Appointment</h2>

        <input type="text" placeholder="Full Name and Surname" required>
        <input type="email" placeholder="Email Address" required>
        <input type="contact" placeholder="Phone Number" required>

        <select required>
            <option value="">Select the service you would like.</option>
            <option>Braiding</option>
            <option>Styling</option>
            <option>Treatments</option>
        </select>

        <input type="date" required>
        
        <input type="time" required>
        
        <textarea placeholder="Additional notes(optional)"></textarea>

        <button type="submit">Confirm Booking!</button>

        <div class="success-message" id="successMsg">
            
        </div>
    </form>
